<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kosmos Connect | Visual Storytelling Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --dark: #111214; --card: #161819;
    --cyan: #00d4e8; --orange: #ff6b1a; --gold: #f5c842;
    --white: #f0f0f0; --muted: #888;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.6; overflow-x: hidden; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 14px 40px; background: rgba(10,10,10,0.94); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,212,232,0.12); }
  .nav-logo { display: flex; align-items: center; gap: 12px; }
  .nav-logo img { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 2px solid var(--cyan); }
  .nav-logo span { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--cyan); }
  .nav-logo span em { color: var(--gold); font-style: normal; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--muted); font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--cyan); }
  .nav-cta { background: var(--cyan) !important; color: var(--black) !important; padding: 8px 20px; border-radius: 4px; font-weight: 600 !important; }
  .nav-cta:hover { background: var(--orange) !important; color: var(--white) !important; }
  .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 130px 24px 80px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(0,212,232,0.08) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 80% 80%, rgba(255,107,26,0.06) 0%, transparent 60%); pointer-events: none; }
  .hero-logo { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid var(--cyan); box-shadow: 0 0 50px rgba(0,212,232,0.35); margin-bottom: 32px; animation: floatLogo 4s ease-in-out infinite; }
  @keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .hero-eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--cyan); margin-bottom: 16px; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 10vw, 110px); line-height: 0.95; letter-spacing: 2px; color: var(--white); margin-bottom: 8px; }
  .hero-title span { color: var(--gold); font-family: 'Dancing Script', cursive; font-size: clamp(38px, 7vw, 80px); }
  .hero-subtitle { font-size: 15px; color: var(--muted); max-width: 560px; margin: 20px auto 36px; line-height: 1.9; }
  .hero-motto { font-family: 'Bebas Neue', sans-serif; font-size: clamp(18px, 3vw, 28px); letter-spacing: 3px; color: var(--orange); margin-bottom: 40px; }
  .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .btn-primary { background: var(--cyan); color: var(--black); padding: 14px 32px; border-radius: 4px; font-weight: 700; font-size: 14px; letter-spacing: 1px; text-decoration: none; text-transform: uppercase; transition: transform 0.2s, background 0.2s; }
  .btn-primary:hover { background: var(--orange); color: var(--white); transform: translateY(-2px); }
  .btn-outline { border: 1px solid var(--cyan); color: var(--cyan); padding: 14px 32px; border-radius: 4px; font-size: 14px; letter-spacing: 1px; text-decoration: none; text-transform: uppercase; transition: transform 0.2s, background 0.2s; }
  .btn-outline:hover { background: rgba(0,212,232,0.1); transform: translateY(-2px); }
  .about-section { background: var(--dark); padding: 100px 24px; }
  .about-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  .about-img { width: 100%; height: 420px; object-fit: cover; border-radius: 12px; border: 2px solid rgba(0,212,232,0.2); }
  .about-text p { color: var(--muted); line-height: 1.9; margin-bottom: 16px; font-size: 15px; }
  .stat-row { display: flex; gap: 32px; margin-top: 32px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--cyan); line-height: 1; }
  .stat-label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  section { padding: 100px 24px; max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--cyan); margin-bottom: 12px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 6vw, 64px); letter-spacing: 2px; line-height: 1; margin-bottom: 16px; }
  .divider { width: 60px; height: 3px; background: linear-gradient(90deg, var(--cyan), var(--orange)); margin-bottom: 48px; border-radius: 2px; }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
  .service-card { background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 36px 24px; text-align: center; transition: transform 0.25s, border-color 0.25s; position: relative; overflow: hidden; }
  .service-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--cyan), var(--orange)); transform: scaleX(0); transition: transform 0.3s; }
  .service-card:hover { transform: translateY(-6px); border-color: rgba(0,212,232,0.3); }
  .service-card:hover::after { transform: scaleX(1); }
  .service-icon { font-size: 40px; margin-bottom: 16px; display: block; }
  .service-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--white); margin-bottom: 10px; }
  .service-desc { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .gallery { background: var(--dark); padding: 100px 0; }
  .gallery-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 48px; }
  .gallery-grid img { width: 100%; height: 340px; object-fit: cover; border-radius: 8px; filter: grayscale(15%); transition: filter 0.3s, transform 0.3s; }
  .gallery-grid img:first-child { grid-column: 1 / -1; height: 440px; }
  .gallery-grid img:hover { filter: grayscale(0%); transform: scale(1.01); }
  .process-section { background: var(--black); }
  .process-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 32px; }
  .process-step { text-align: center; padding: 32px 20px; }
  .step-num { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: rgba(0,212,232,0.15); line-height: 1; margin-bottom: 8px; }
  .step-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--white); margin-bottom: 10px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .testi-section { background: var(--dark); padding: 100px 24px; }
  .testi-inner { max-width: 1100px; margin: 0 auto; }
  .testi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 48px; }
  .testi-card { background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 32px; }
  .testi-stars { color: var(--gold); font-size: 18px; margin-bottom: 16px; letter-spacing: 2px; }
  .testi-text { font-size: 14px; color: var(--muted); line-height: 1.9; margin-bottom: 20px; font-style: italic; }
  .testi-author { font-size: 13px; color: var(--cyan); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .contact-section { background: var(--black); }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
  .contact-item { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 28px; }
  .contact-icon { font-size: 22px; min-width: 36px; margin-top: 2px; }
  .contact-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan); margin-bottom: 4px; }
  .contact-value { font-size: 15px; color: var(--white); }
  .contact-value a { color: var(--white); text-decoration: none; transition: color 0.2s; }
  .contact-value a:hover { color: var(--cyan); }
  .social-links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 32px; }
  .social-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid rgba(255,255,255,0.08); color: var(--white); text-decoration: none; padding: 10px 18px; border-radius: 4px; font-size: 13px; transition: border-color 0.2s, color 0.2s; }
  .social-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .whatsapp-btn { display: inline-flex; align-items: center; gap: 10px; background: #25D366; color: #fff; text-decoration: none; padding: 16px 32px; border-radius: 4px; font-size: 15px; font-weight: 700; margin-top: 32px; transition: opacity 0.2s, transform 0.2s; }
  .whatsapp-btn:hover { opacity: 0.88; transform: translateY(-2px); }
  .contact-blurb { font-size: 15px; color: var(--muted); line-height: 1.9; margin-bottom: 24px; }
  .cta-banner { background: linear-gradient(135deg, rgba(0,212,232,0.12), rgba(255,107,26,0.08)); border-top: 1px solid rgba(0,212,232,0.15); border-bottom: 1px solid rgba(0,212,232,0.15); padding: 80px 24px; text-align: center; }
  .cta-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 6vw, 60px); letter-spacing: 2px; margin-bottom: 16px; }
  .cta-banner p { color: var(--muted); margin-bottom: 36px; font-size: 15px; }
  footer { background: var(--dark); border-top: 1px solid rgba(255,255,255,0.06); padding: 48px 24px; }
  .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; }
  .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--cyan); }
  .footer-logo em { color: var(--gold); font-style: normal; }
  .footer-links { display: flex; gap: 24px; list-style: none; }
  .footer-links a { color: var(--muted); text-decoration: none; font-size: 13px; transition: color 0.2s; }
  .footer-links a:hover { color: var(--cyan); }
  .footer-copy { width: 100%; text-align: center; color: var(--muted); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 24px; margin-top: 8px; }
  @media (max-width: 700px) {
    nav { padding: 12px 20px; }
    .nav-links { display: none; }
    .about-inner { grid-template-columns: 1fr; }
    .gallery-grid { grid-template-columns: 1fr; }
    .gallery-grid img:first-child { height: 260px; }
    .contact-grid { grid-template-columns: 1fr; gap: 32px; }
    section { padding: 70px 20px; }
    .stat-row { gap: 16px; }
    .footer-inner { flex-direction: column; text-align: center; }
  }
</style>
</head>
